<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification System - Stage 1 & 2</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .badge-container {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #unreadBadge {
      background: #ff6b6b;
      color: white;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }

    .controls {
      padding: 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .error {
      background: #ff6b6b;
      color: white;
      padding: 15px;
      margin: 0;
      display: none;
      border-radius: 0;
    }

    #notificationsList {
      padding: 20px;
      max-height: 500px;
      overflow-y: auto;
    }

    .notification-item {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 5px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .notification-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .notification-item.read {
      opacity: 0.7;
      border-left-color: #95a5a6;
    }

    .notification-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .notification-header h3 {
      font-size: 18px;
      color: #333;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge.unread {
      background: #ff6b6b;
      color: white;
    }

    .badge.read {
      background: #95a5a6;
      color: white;
    }

    .notification-item p {
      color: #666;
      margin: 10px 0;
      line-height: 1.6;
    }

    .notification-item small {
      color: #999;
      display: block;
      margin: 8px 0;
    }

    .timestamp {
      color: #bbb;
      font-size: 11px !important;
      margin-top: 8px !important;
    }

    .notification-actions {
      display: flex;
      gap: 10px;
      margin: 10px 0;
    }

    .notification-actions button {
      padding: 8px 15px;
      font-size: 12px;
      background: #667eea;
      flex: 1;
    }

    .pagination {
      padding: 20px;
      background: #f8f9fa;
      border-top: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #pageIndicator {
      font-weight: bold;
      color: #333;
    }

    .footer {
      padding: 15px 20px;
      background: #ecf0f1;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #777;
      text-align: center;
    }

    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .notification-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>🔔 Notifications</h1>
        <p>Stage 1 & 2 Implementation</p>
      </div>
      <div class="badge-container">
        <span id="unreadBadge">0</span>
      </div>
    </div>

    <div id="error" class="error"></div>

    <div class="controls">
      <button id="refreshBtn">🔄 Refresh</button>
      <button id="markAllReadBtn">✓ Mark All Read</button>
    </div>

    <div id="notificationsList">
      <p>Loading notifications...</p>
    </div>

    <div class="pagination">
      <button id="prevPageBtn">← Previous</button>
      <span id="pageIndicator">Page 1 of 1</span>
      <button id="nextPageBtn">Next →</button>
    </div>

    <div class="footer">
      <p>Connected to: http://localhost:5000/api/v1 | Cache TTL: 5 minutes | User: test_user_001</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
